{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>➕ Adicionar Doação</h2>
    <a href="/doar" class="btn btn-secondary">← Voltar para lista</a>
</div>

<!-- 🔔 Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST" action="/doar/cadastrar">
    <div class="mb-3">
        <input type="text" name="item" class="form-control" placeholder="Item" required>
    </div>
    <div class="mb-3">
        <input type="number" name="quantidade" class="form-control" placeholder="Quantidade" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Adicionar Doação</button>
</form>
{% endblock %}
