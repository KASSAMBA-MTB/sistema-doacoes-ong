{% extends 'base.html' %}

{% block content %}
    <h2>Cadastro de Doação</h2>

    <form method="POST">
        <label>Nome do item:</label><br>
        <input type="text" name="item" required><br><br>

        <label>Quantidade:</label><br>
        <input type="number" name="quantidade" required><br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <hr>

    <h3>Doações cadastradas:</h3>

    <ul>
        <ul>
    {% for id, item, quantidade in doacoes %}
        <li>
            {{ item }} - {{ quantidade }}
            <a href="/editar/{{ id }}">✏ Editar</a>
            <a href="/excluir/{{ id }}">❌ Excluir</a>
        </li>
    {% endfor %}
</ul>
    </ul>

{% endblock %}
