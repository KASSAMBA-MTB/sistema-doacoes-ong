{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">📦 Cadastro de Doações</h2>

<!-- 🔎 FILTRO / BUSCA -->
<div class="card shadow p-4 mb-4">
    <form method="GET">
        <div class="row g-3">

            <div class="col-md-3">
                <input type="text" name="busca" class="form-control"
                       placeholder="Buscar item..."
                       value="{{ busca or '' }}">
            </div>

            <div class="col-md-3">
                <input type="date" name="data_inicio" class="form-control"
                       value="{{ data_inicio or '' }}">
            </div>

            <div class="col-md-3">
                <input type="date" name="data_fim" class="form-control"
                       value="{{ data_fim or '' }}">
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-primary w-100">Buscar</button>
                <a href="/doar" class="btn btn-secondary w-100">Limpar</a>
            </div>

        </div>
    </form>
</div>

<!-- 📦 FORMULÁRIO DE CADASTRO -->
<div class="card shadow p-4 mb-4">
    <form method="POST">
        <div class="row g-3">

            <div class="col-md-5">
                <input type="text" name="item" class="form-control"
                       placeholder="Item" required>
            </div>

            <div class="col-md-3">
                <input type="number" name="quantidade" class="form-control"
                       placeholder="Quantidade" min="1" required>
            </div>

            <div class="col-md-4">
                <button class="btn btn-success w-100">
                    ➕ Adicionar Doação
                </button>
            </div>

        </div>
    </form>
</div>

<!-- 📋 LISTA DE DOAÇÕES -->
<div class="card shadow p-4">

    <h5 class="mb-3">📋 Lista de Doações</h5>

    {% if doacoes %}

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">

            <thead class="table-light">
                <tr>
                    <th>Item</th>
                    <th>Quantidade</th>
                    <th>Data</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>

        <tbody>
            {% for d in doacoes %}
            <tr>
                <td>{{ d.item }}</td>
                <td>{{ d.quantidade }}</td>
                <td>{{ d.data }}</td>

                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">

                        <a href="/editar/{{ d.id }}" class="btn btn-warning btn-sm">
                            ✏️ Editar
                        </a>

                        <form action="/excluir/{{ d.id }}" method="POST"
                            onsubmit="return confirm('Tem certeza que deseja excluir?');">

                            <button class="btn btn-danger btn-sm">
                                🗑 Excluir
                            </button>
                        </form>

                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>

        </table>
    </div>

    {% else %}

    <div class="alert alert-info text-center">
        Nenhuma doação encontrada.
    </div>

    {% endif %}

</div>

{% endblock %}
