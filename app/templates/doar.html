{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">📦 Cadastro de Doações</h2>

<!-- 🔎 FILTRO / BUSCA -->
<div class="card shadow p-4 mb-4">
    <form method="GET">
        <div class="row g-3">

            <div class="col-md-3">
                <input type="text" name="busca" class="form-control"
                       placeholder="Buscar item..."
                       value="{{ busca or '' }}">
            </div>

            <div class="col-md-3">
                <input type="date" name="data_inicio" class="form-control"
                       value="{{ data_inicio or '' }}">
            </div>

            <div class="col-md-3">
                <input type="date" name="data_fim" class="form-control"
                       value="{{ data_fim or '' }}">
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-primary w-100">Buscar</button>
                <a href="/doar" class="btn btn-secondary w-100">Limpar</a>
            </div>

        </div>
    </form>
</div>

<!-- 📦 FORMULÁRIO DE CADASTRO -->
<div class="card shadow p-4 mb-4">
    <form method="POST">
        <div class="row g-3">

            <div class="col-md-5">
                <input type="text" name="item" class="form-control"
                       placeholder="Item" required>
            </div>

            <div class="col-md-3">
                <input type="number" name="quantidade" class="form-control"
                       placeholder="Quantidade" required>
            </div>

            <div class="col-md-4">
                <button class="btn btn-success w-100">
                    ➕ Adicionar Doação
                </button>
            </div>

        </div>
    </form>
</div>

<!-- 📋 LISTA DE DOAÇÕES -->
<div class="card shadow p-4">

    <h5 class="mb-3">📋 Lista de Doações</h5>

    <table class="table table-striped table-hover align-middle">

        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for d in doacoes %}
            <tr>
                <td>{{ d[0] }}</td>
                <td>{{ d[1] }}</td>
                <td>{{ d[2] }}</td>

                <!-- 🗓 DATA FORMATADA -->
                <td>
                    {% if d[3] %}
                        {{ d[3][:10] }} {{ d[3][11:16] }}
                    {% else %}
                        -
                    {% endif %}
                </td>

                <td>
                    <a href="/editar/{{ d[0] }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/excluir/{{ d[0] }}" class="btn btn-danger btn-sm">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
