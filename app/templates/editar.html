{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">✏ Editar Doação</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Nome do item</label>
        <input 
            type="text" 
            name="item" 
            class="form-control" 
            value="{{ doacao[0] }}" 
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Quantidade</label>
        <input 
            type="number" 
            name="quantidade" 
            class="form-control" 
            value="{{ doacao[1] }}" 
            required>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            💾 Atualizar
        </button>

        <a href="/doar" class="btn btn-secondary">
            ← Voltar
        </a>
    </div>

</form>

{% endblock %}
